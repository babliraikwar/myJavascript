<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Background Color Changer in Every Second</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#0f172a;
font-family:sans-serif;
transition:background 0.5s;
}

.card-box{
padding:40px;
border-radius:20px;
background:white;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

    h1{
font-size:28px;
margin-bottom:30px;
font-weight:600;
}

.btn-custom{
padding:12px 30px;
font-size:18px;
border-radius:10px;
margin:10px;
}
  </style>
</head>
<body>
  <!-- card box start here -->
  <div class="card-box">
  <h1>Background Color Changer</h1>
  <button id="start" class="btn btn-success btn-custom">Start</button>
  <button id="stop" class="btn btn-danger btn-custom">Stop</button>
  </div>
  <!-- card box end here -->

</body>

<script>

  // generated random color 
  const randomColor=function(){
    const hex="0123456789ABCDEF"
    let color='#'
    for(let i=0; i<6; i++){
      color+=hex[Math.floor(Math.random()*16)]
    }
    return color
  }

  let intervalId;
 const startChangingColor=function(){
  
if(!intervalId){
  intervalId =setInterval(changeBgColor, 1000)
}
  function changeBgColor (){
   const bgcolor= document.body.style.backgroundColor=randomColor();
    console.log(bgcolor)
  }
 }
 const stopChangingColor =function(){
  clearInterval(intervalId)
  intervalId=null
 }
 document.querySelector("#start").addEventListener('click',startChangingColor);
 document.querySelector("#stop").addEventListener('click',stopChangingColor);
 
</script>
</html>
